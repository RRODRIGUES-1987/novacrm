<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NovaCRM">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<title>NovaCRM</title>
<style>
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#f0f0ec;--text:#1a1a1a;--text2:#666;--text3:#999;--border:#e5e5e0;--border2:#d0d0ca;--accent:#1a1a1a;--accent-text:#fff;--green:#1D9E75;--green-bg:#e8f7f2;--green-text:#0a5c43;--blue-bg:#e8f1fb;--blue-text:#1a4a8a;--amber-bg:#fdf3e3;--amber-text:#7a4a0a;--red-bg:#fdeaea;--red-text:#8a1a1a;--gray-bg:#f0f0ec;--gray-text:#555;--radius:10px;--radius-xl:20px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--font:'DM Sans',sans-serif;}
@media(prefers-color-scheme:dark){:root{--bg:#111;--bg2:#1a1a1a;--bg3:#222;--text:#f0f0ec;--text2:#999;--text3:#666;--border:#2a2a2a;--border2:#333;--accent:#f0f0ec;--accent-text:#111;--green-bg:#0a2e22;--green-text:#4ecda0;--blue-bg:#0a1a2e;--blue-text:#6aabf7;--amber-bg:#2e1a00;--amber-text:#f0a840;--red-bg:#2e0a0a;--red-text:#f07070;--gray-bg:#222;--gray-text:#aaa;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:100%;max-width:360px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px 28px}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.auth-logo-icon{width:40px;height:40px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--accent-text)}
.auth-logo-name{font-size:20px;font-weight:600;letter-spacing:-0.4px}.auth-logo-name span{font-weight:300;color:var(--text2)}
.auth-title{font-size:17px;font-weight:600;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.fg{margin-bottom:12px}
.fl{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:14px;outline:none;font-family:var(--font);transition:border-color .15s}
.fi:focus{border-color:var(--border2)}
.fi-wrap{position:relative}.fi-wrap .fi{padding-right:42px}
.fi-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;display:flex}
.btn-full{width:100%;padding:12px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);background:var(--accent);color:var(--accent-text);transition:opacity .15s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-full:hover{opacity:.88}.btn-full:disabled{opacity:.5;cursor:not-allowed}
.auth-switch{text-align:center;margin-top:14px;font-size:13px;color:var(--text2)}
.auth-switch a{color:var(--text);font-weight:500;cursor:pointer;text-decoration:underline}
.msg{border-radius:var(--radius);padding:10px 13px;font-size:13px;margin-bottom:12px;display:none}
.msg.show{display:block}
.msg-err{background:var(--red-bg);color:var(--red-text);border:1px solid #f5c5c5}
.msg-ok{background:var(--green-bg);color:var(--green-text);border:1px solid #a8e8d0}
.pw-strength{height:3px;border-radius:2px;margin-top:5px;background:var(--border)}.pw-bar{height:100%;border-radius:2px;transition:all .3s;width:0}.pw-hint{font-size:11px;margin-top:3px}
.back-link{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:14px}.back-link:hover{color:var(--text)}
/* APP */
.app{display:none;height:100vh;height:100dvh;flex-direction:column;overflow:hidden}
.app.on{display:flex}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:calc(var(--safe-top)+12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-size:17px;font-weight:600;letter-spacing:-0.3px}.logo span{color:var(--text2);font-weight:400}
.user-chip{display:flex;align-items:center;gap:7px;padding:5px 10px 5px 6px;border:1px solid var(--border);border-radius:99px;cursor:pointer}
.user-chip:hover{background:var(--bg2)}
.uav{width:22px;height:22px;border-radius:50%;background:var(--accent);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.uname{font-size:12px;font-weight:500;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.bottomnav{background:var(--bg);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);flex-shrink:0}
.navitem{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;gap:3px;color:var(--text3);border:none;background:none;transition:color .15s}
.navitem.active{color:var(--text)}.navitem svg{width:22px;height:22px;stroke-width:1.6}.navitem span{font-size:10px;font-weight:500}
@media(min-width:768px){
  .app{flex-direction:row}.topbar{display:none}
  .bottomnav{flex-direction:column;width:200px;border-top:none;border-right:1px solid var(--border);padding-bottom:0}
  .sidebar-logo{display:flex;align-items:center;gap:8px;padding:16px;border-bottom:1px solid var(--border);font-size:15px;font-weight:600}
  .sidebar-logo-icon{width:28px;height:28px;border-radius:7px;background:var(--accent);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .navitem{flex-direction:row;justify-content:flex-start;padding:8px 14px;gap:9px;border-radius:var(--radius);margin:2px 8px;width:calc(100% - 16px)}
  .navitem svg{width:17px;height:17px}.navitem span{font-size:13px}.navitem.active{background:var(--bg3)}
  .dtopbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
  .dtitle{font-size:15px;font-weight:600}
  .main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}.content{padding:16px}
  .bnspacer{flex:1}
  .sbuser{padding:10px 12px;border-top:1px solid var(--border)}
  .sbuserchip{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);cursor:pointer}
  .sbuserchip:hover{background:var(--bg3)}
  .sbuav{width:26px;height:26px;border-radius:50%;background:var(--accent);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
  .sbuinfo{min-width:0}.sbuname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sburole{font-size:11px;color:var(--text2)}
}
@media(max-width:767px){.sidebar-logo,.dtopbar,.bnspacer,.sbuser{display:none}}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:600px){.metrics{grid-template-columns:repeat(4,1fr)}}
.metric{background:var(--bg2);border-radius:var(--radius);padding:12px 14px}
.mlabel{font-size:11px;color:var(--text2);margin-bottom:3px}.mval{font-size:22px;font-weight:600;line-height:1}.msub{font-size:11px;color:var(--green);margin-top:3px}
/* LIST */
.li{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer}
.li:hover{background:var(--bg2)}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.av0{background:var(--blue-bg);color:var(--blue-text)}.av1{background:var(--green-bg);color:var(--green-text)}.av2{background:var(--amber-bg);color:var(--amber-text)}.av3{background:#f0e8fb;color:#4a1a8a}.av4{background:#fbe8f0;color:#8a1a4a}
.linfo{flex:1;min-width:0}.lname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lsub{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.bdg{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:500}
.bg{background:var(--green-bg);color:var(--green-text)}.bb{background:var(--blue-bg);color:var(--blue-text)}.ba{background:var(--amber-bg);color:var(--amber-text)}.bgr{background:var(--gray-bg);color:var(--gray-text)}
/* PIPELINE */
.pscroll{overflow-x:auto;padding-bottom:8px}.pipeline{display:flex;gap:8px;min-width:max-content}
.stage{background:var(--bg2);border-radius:var(--radius);padding:10px;width:170px;flex-shrink:0}
@media(min-width:900px){.pscroll{overflow-x:visible}.pipeline{display:grid;grid-template-columns:repeat(5,1fr);min-width:0}.stage{width:auto}}
.shdr{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:7px;display:flex;justify-content:space-between;text-transform:uppercase;letter-spacing:.5px}
.dcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;margin-bottom:5px;cursor:pointer}
.dcard:hover{border-color:var(--border2)}
.dname{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dcontact{font-size:11px;color:var(--text2);margin-top:2px}.dval{font-size:12px;font-weight:600;margin-top:4px}
/* TASKS */
.ti{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer}
.tck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tck.done{background:var(--green);border-color:var(--green)}.tt{font-size:13px}.tt.done{text-decoration:line-through;color:var(--text2)}.tdue{font-size:11px;color:var(--text3);margin-top:1px}
/* BUTTONS */
.btn{padding:7px 13px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);display:inline-flex;align-items:center;gap:6px;font-family:var(--font);transition:all .15s;font-weight:500}
.btn:hover{background:var(--bg2)}.btn-p{background:var(--accent);color:var(--accent-text);border-color:transparent}.btn-p:hover{opacity:.88}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:8px}.bicon{padding:6px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);display:inline-flex;transition:all .15s}.bicon:hover{background:var(--bg2);color:var(--text)}
.sechdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}.sectitle{font-size:13px;font-weight:600}
.swrap{display:flex;align-items:center;gap:7px;padding:7px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);flex:1;max-width:220px}
.swrap input{border:none;background:transparent;outline:none;font-size:13px;color:var(--text);width:100%;font-family:var(--font)}.swrap input::placeholder{color:var(--text3)}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;justify-content:center;z-index:100}
.mbg.open{display:flex;animation:fi .15s}
@media(min-width:500px){.mbg{align-items:center}}
.modal{background:var(--bg);border-radius:var(--radius-xl) var(--radius-xl) 0 0;width:100%;max-width:440px;padding:20px 18px calc(20px + var(--safe-bottom));animation:su .2s}
@media(min-width:500px){.modal{border-radius:var(--radius-xl);padding:22px 20px}}
.mhandle{width:36px;height:4px;background:var(--border2);border-radius:4px;margin:0 auto 14px;display:block}
@media(min-width:500px){.mhandle{display:none}}
.mtitle{font-size:16px;font-weight:600;margin-bottom:14px}.mfoot{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
/* MENU */
.umwrap{position:fixed;top:calc(var(--safe-top)+52px);right:14px;z-index:90;display:none}
.umwrap.open{display:block;animation:fi .15s}
.umenu{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:6px;min-width:185px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.umhdr{padding:7px 10px 10px;border-bottom:1px solid var(--border);margin-bottom:4px}.umnm{font-size:13px;font-weight:600}.umem{font-size:11px;color:var(--text2);margin-top:1px}
.umitem{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);font-size:13px;cursor:pointer}.umitem:hover{background:var(--bg2)}.umitem.danger{color:var(--red-text)}
/* IDLE */
.idlewarn{position:fixed;bottom:calc(76px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(12px);background:var(--amber-bg);border:1px solid #f0c070;border-radius:12px;padding:12px 14px;z-index:150;min-width:280px;max-width:360px;width:calc(100% - 32px);box-shadow:0 4px 16px rgba(0,0,0,.12);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
.idlewarn.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){.idlewarn{bottom:20px;left:calc(100px + 50%)}}
.idleinner{display:flex;align-items:center;gap:10px}.idletxt{flex:1;font-size:12px;color:var(--amber-text);display:flex;flex-direction:column;gap:2px}.idletxt strong{font-size:13px}
.idlebtn{padding:5px 12px;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;border:none;background:#c07000;color:#fff;font-family:var(--font);white-space:nowrap;flex-shrink:0}
/* FAB */
.fab{position:fixed;right:16px;bottom:calc(68px + var(--safe-bottom));width:52px;height:52px;border-radius:50%;background:var(--accent);color:var(--accent-text);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.18);z-index:50}
@media(min-width:768px){.fab{display:none}}
/* EMPTY */
.empty{text-align:center;padding:32px 16px;color:var(--text2)}.empty svg{width:38px;height:38px;stroke:var(--border2);margin-bottom:10px}.empty p{font-size:13px}
/* SPINNER */
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:rotate .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes rotate{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-wrap" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><div class="auth-logo-icon">N</div><div class="auth-logo-name">Nova<span>CRM</span></div></div>

    <!-- LOGIN -->
    <div id="vlogin">
      <div class="auth-title">Bem-vindo de volta</div>
      <div class="auth-sub">Entre com sua conta para continuar.</div>
      <div class="msg msg-err" id="lerr"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" id="lemail" type="email" placeholder="seu@email.com" autocomplete="email"></div>
      <div class="fg"><label class="fl">Senha</label>
        <div class="fi-wrap"><input class="fi" id="lpw" type="password" placeholder="••••••••" autocomplete="current-password">
        <button class="fi-eye" onclick="togglePw('lpw',this)" tabindex="-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
      </div>
      <button class="btn-full" id="lbtn" onclick="doLogin()">Entrar</button>
      <div class="auth-switch">Esqueceu a senha? <a onclick="sv('vrecover')">Recuperar</a></div>
      <div class="auth-switch" style="margin-top:8px">Sem conta? <a onclick="sv('vreg')">Criar conta</a></div>
    </div>

    <!-- CADASTRO -->
    <div id="vreg" style="display:none">
      <div class="back-link" onclick="sv('vlogin')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Voltar
      </div>
      <div class="auth-title">Criar conta</div>
      <div class="msg msg-err" id="rerr"></div>
      <div class="msg msg-ok" id="rok"></div>
      <div class="fg"><label class="fl">Nome</label><input class="fi" id="rname" placeholder="Nome completo" autocomplete="name"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" id="remail" type="email" placeholder="seu@email.com" autocomplete="email"></div>
      <div class="fg"><label class="fl">Senha</label>
        <div class="fi-wrap"><input class="fi" id="rpw" type="password" placeholder="mínimo 6 caracteres" oninput="pwStr(this.value)">
        <button class="fi-eye" onclick="togglePw('rpw',this)" tabindex="-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
        <div class="pw-strength"><div class="pw-bar" id="pwbar"></div></div>
        <div class="pw-hint" id="pwhint"></div>
      </div>
      <div class="fg"><label class="fl">Confirmar senha</label>
        <div class="fi-wrap"><input class="fi" id="rpw2" type="password" placeholder="repita a senha">
        <button class="fi-eye" onclick="togglePw('rpw2',this)" tabindex="-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
      </div>
      <button class="btn-full" id="rbtn" onclick="doRegister()">Criar conta</button>
    </div>

    <!-- RECUPERAR -->
    <div id="vrecover" style="display:none">
      <div class="back-link" onclick="sv('vlogin')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Voltar
      </div>
      <div class="auth-title">Recuperar acesso</div>
      <div class="auth-sub">Informe seu email para receber o link.</div>
      <div class="msg msg-err" id="recerr"></div>
      <div class="msg msg-ok" id="recok"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" id="recemail" type="email" placeholder="seu@email.com"></div>
      <button class="btn-full" onclick="doRecover()">Enviar link</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <nav class="bottomnav" id="sidenav">
    <div class="sidebar-logo"><div class="sidebar-logo-icon">N</div>NovaCRM</div>
    <button class="navitem active" id="nav-dashboard" onclick="pg('dashboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Dashboard</span></button>
    <button class="navitem" id="nav-contatos" onclick="pg('contatos')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Contatos</span></button>
    <button class="navitem" id="nav-pipeline" onclick="pg('pipeline')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Pipeline</span></button>
    <button class="navitem" id="nav-tarefas" onclick="pg('tarefas')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Tarefas</span></button>
    <div class="bnspacer"></div>

<script>
const SB_URL='https://trngaecaurksscwmkfsf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRybmdhZWNhdXJrc3Njd21rZnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjY0NTYsImV4cCI6MjA5Mzc0MjQ1Nn0.VLi1x7l6dPooKRtuC6K2sY4K_2-0L2n4FvaqaaYU8I4';

const STAGES=['Prospecção','Qualificação','Proposta','Negociação','Fechado'];
const SBM={Cliente:'bdg bg',Lead:'bdg bb',Prospecto:'bdg ba',Inativo:'bdg bgr'};
const AVC=['av0','av1','av2','av3','av4'];
let cu=null,tok=null,contacts=[],deals=[],tasks=[],curPage='dashboard',mmode='',mid=null,stmr=null;

const ini=n=>{const p=n.trim().split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();};
const fmtV=v=>'R$'+Number(v).toLocaleString('pt-BR');
const ge=id=>document.getElementById(id);

// ── SUPABASE REST ──
async function sbFetch(method,path,body,token){
  const h={'Content-Type':'application/json','apikey':SB_KEY,'Prefer':'return=representation'};
  if(token)h['Authorization']='Bearer '+token;
  const r=await fetch(SB_URL+path,{method,headers:h,body:body?JSON.stringify(body):undefined});
  const txt=await r.text();
  let data=null;try{data=txt?JSON.parse(txt):null;}catch(e){}
  return{ok:r.ok,data,status:r.status};
}

async function sbAuth(path,body){
  const r=await fetch(SB_URL+'/auth/v1/'+path,{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify(body)});
  const data=await r.json();
  return{ok:r.ok,data};
}

async function dbSelect(table,filter=''){
  const r=await sbFetch('GET',`/rest/v1/${table}?${filter}&order=created_at.desc`,null,tok);
  return r.ok?(Array.isArray(r.data)?r.data:[]):[];
}
async function dbInsert(table,body){
  const r=await sbFetch('POST',`/rest/v1/${table}`,body,tok);
  if(r.ok&&r.data){return Array.isArray(r.data)?r.data[0]:r.data;}
  return null;
}
async function dbUpdate(table,id,body){
  await sbFetch('PATCH',`/rest/v1/${table}?id=eq.${id}`,body,tok);
}
async function dbDelete(table,id){
  await sbFetch('DELETE',`/rest/v1/${table}?id=eq.${id}`,null,tok);
}

// ── AUTH VIEWS ──
function sv(id){
  ['vlogin','vreg','vrecover'].forEach(v=>ge(v)&&(ge(v).style.display='none'));
  if(ge(id))ge(id).style.display='';
  ['lerr','rerr','rok','recerr','recok'].forEach(id=>{const e=ge(id);if(e){e.classList.remove('show');e.textContent='';}});
}
function showErr(id,m){const e=ge(id);if(e){e.textContent=m;e.classList.add('show');}}
function showOk(id,m){const e=ge(id);if(e){e.textContent=m;e.classList.add('show');}}

function togglePw(id,btn){
  const inp=ge(id);const show=inp.type==='password';inp.type=show?'text':'password';
  btn.innerHTML=show?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}

function pwStr(pw){
  const bar=ge('pwbar'),hint=ge('pwhint');if(!bar)return;
  if(!pw){bar.style.width='0';hint.textContent='';return;}
  let s=0;if(pw.length>=6)s++;if(pw.length>=10)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
  const lvl=[{w:'20%',c:'#E24B4A',t:'Muito fraca'},{w:'40%',c:'#EF9F27',t:'Fraca'},{w:'60%',c:'#EF9F27',t:'Razoável'},{w:'80%',c:'#1D9E75',t:'Boa'},{w:'100%',c:'#1D9E75',t:'Forte'}];
  const l=lvl[Math.min(s,4)];bar.style.width=l.w;bar.style.background=l.c;hint.textContent=l.t;hint.style.color=l.c;
}

// ── AUTH ACTIONS ──
async function doLogin(){
  const email=ge('lemail').value.trim(),pw=ge('lpw').value;
  ge('lerr').classList.remove('show');
  if(!email)return showErr('lerr','Informe seu email.');
  if(!pw)return showErr('lerr','Informe sua senha.');
  const btn=ge('lbtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span> Entrando...';
  const{ok,data}=await sbAuth('token?grant_type=password',{email,password:pw});
  btn.disabled=false;btn.innerHTML='Entrar';
  if(!ok){return showErr('lerr',data.error_description||data.msg||'Email ou senha incorretos.');}
  tok=data.access_token;
  sessionStorage.setItem('crm_tok',tok);
  sessionStorage.setItem('crm_user',JSON.stringify(data.user));
  enterApp(data.user);
}

async function doRegister(){
  const name=ge('rname').value.trim(),email=ge('remail').value.trim(),pw=ge('rpw').value,pw2=ge('rpw2').value;
  ['rerr','rok'].forEach(id=>{const e=ge(id);if(e){e.classList.remove('show');e.textContent='';}});
  if(!name)return showErr('rerr','Insira seu nome.');
  if(!email||!email.includes('@'))return showErr('rerr','Email inválido.');
  if(pw.length<6)return showErr('rerr','Senha muito curta.');
  if(pw!==pw2)return showErr('rerr','Senhas não coincidem.');
  const btn=ge('rbtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span> Criando...';
  const{ok,data}=await sbAuth('signup',{email,password:pw,data:{full_name:name}});
  btn.disabled=false;btn.innerHTML='Criar conta';
  if(!ok)return showErr('rerr',data.msg||data.error_description||'Erro ao criar conta.');
  if(data.access_token){
    tok=data.access_token;
    sessionStorage.setItem('crm_tok',tok);
    sessionStorage.setItem('crm_user',JSON.stringify(data.user));
    enterApp(data.user);
  } else {
    showOk('rok','Conta criada! Confirme seu email e faça login.');
  }
}

async function doRecover(){
  const email=ge('recemail').value.trim();
  ['recerr','recok'].forEach(id=>{const e=ge(id);if(e){e.classList.remove('show');e.textContent='';}});
  if(!email||!email.includes('@'))return showErr('recerr','Email inválido.');
  const{ok,data}=await sbAuth('recover',{email,redirect_to:window.location.href});
  if(!ok)return showErr('recerr',data.msg||'Erro.');
  showOk('recok','Link enviado! Verifique seu email.');
}

async function doLogout(){
  if(!confirm('Deseja sair?'))return;
  await sbFetch('POST','/auth/v1/logout',{},tok);
  sessionStorage.clear();tok=null;cu=null;
  ge('app').classList.remove('on');
  ge('auth-wrap').style.display='flex';
  sv('vlogin');
  closeMenu();
}

// ── ENTER APP ──
async function enterApp(user){
  cu=user;
  const meta=user.user_metadata||{};
  const name=meta.full_name||meta.name||user.email.split('@')[0];
  const av=name.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2);
  ['tbav','sbav'].forEach(id=>{const e=ge(id);if(e)e.textContent=av;});
  ['tbnm','sbnm'].forEach(id=>{const e=ge(id);if(e)e.textContent=name.split(' ')[0];});
  const nm=ge('umnm');if(nm)nm.textContent=name;
  const em=ge('umem');if(em)em.textContent=user.email;
  ge('auth-wrap').style.display='none';
  ge('app').classList.add('on');
  await loadData();
  pg('dashboard');
  resetIdle();
}

async function loadData(){
  const uid=cu.id;
  [contacts,deals,tasks]=await Promise.all([
    dbSelect('contacts',`user_id=eq.${uid}`),
    dbSelect('deals',`user_id=eq.${uid}`),
    dbSelect('tasks',`user_id=eq.${uid}`),
  ]);
}

// ── IDLE ──
const IDLE=15*60*1000,WARN=60*1000;
let itimer=null,wtimer=null,cdiv=null;
function resetIdle(){
  if(!cu)return;
  clearTimeout(itimer);clearTimeout(wtimer);clearInterval(cdiv);
  ge('idlewarn').classList.remove('show');
  wtimer=setTimeout(()=>{
    if(!cu)return;
    const w=ge('idlewarn'),cd=ge('idlecd');
    if(w)w.classList.add('show');let s=60;if(cd)cd.textContent=s;
    clearInterval(cdiv);cdiv=setInterval(()=>{s--;if(cd)cd.textContent=s;if(s<=0)clearInterval(cdiv);},1000);
  },IDLE-WARN);
  itimer=setTimeout(()=>{
    ge('idlewarn').classList.remove('show');
    clearInterval(cdiv);
    doIdleLogout();
  },IDLE);
}
function stayOn(){resetIdle();}
async function doIdleLogout(){
  sessionStorage.clear();tok=null;cu=null;
  ge('app').classList.remove('on');
  ge('auth-wrap').style.display='flex';
  sv('vlogin');closeMenu();
  setTimeout(()=>showErr('lerr','Sessão encerrada por inatividade.'),50);
}
['mousemove','mousedown','keydown','touchstart','click','scroll'].forEach(e=>{
  document.addEventListener(e,()=>{if(cu)resetIdle();},{passive:true});
});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&cu)resetIdle();});

// ── PAGES ──
function pg(p){
  curPage=p;
  ['dashboard','contatos','pipeline','tarefas'].forEach(x=>{const e=ge('nav-'+x);if(e)e.classList.toggle('active',x===p);});
  const titles={dashboard:'Dashboard',contatos:'Contatos',pipeline:'Pipeline',tarefas:'Tarefas'};
  const dt=ge('dtitle');if(dt)dt.textContent=titles[p];
  const da=ge('dadd');if(da){const lb={dashboard:'+ Novo contato',contatos:'+ Novo contato',pipeline:'+ Novo negócio',tarefas:'+ Nova tarefa'};da.textContent=lb[p];}
  render();
}

function render(){
  const c=ge('content');if(!c)return;
  if(curPage==='dashboard')c.innerHTML=rDash();
  else if(curPage==='contatos')c.innerHTML=rContatos();
  else if(curPage==='pipeline')c.innerHTML=rPipeline();
  else if(curPage==='tarefas')c.innerHTML=rTarefas();
}

function rDash(){
  const total=deals.reduce((s,d)=>s+Number(d.value||0),0);
  const pend=tasks.filter(t=>!t.done).length;
  const open=deals.filter(d=>d.stage!=='Fechado').length;
  const rows=contacts.slice(0,5).map((c,i)=>`<div class="li"><div class="av ${AVC[i%5]}">${ini(c.name)}</div><div class="linfo"><div class="lname">${c.name}</div><div class="lsub">${c.company||''}</div></div><div class="lright"><span class="${SBM[c.status]||'bdg bgr'}">${c.status}</span></div></div>`).join('');
  return`<div class="metrics"><div class="metric"><div class="mlabel">Contatos</div><div class="mval">${contacts.length}</div><div class="msub">Cadastrados</div></div><div class="metric"><div class="mlabel">Negócios</div><div class="mval">${open}</div><div class="msub">Em andamento</div></div><div class="metric"><div class="mlabel">Pipeline</div><div class="mval" style="font-size:16px">${fmtV(total)}</div><div class="msub">Total</div></div><div class="metric"><div class="mlabel">Tarefas</div><div class="mval">${pend}</div><div class="msub">Pendentes</div></div></div><div class="sechdr"><span class="sectitle">Contatos recentes</span><button class="btn btn-sm" onclick="pg('contatos')">Ver todos</button></div>${rows||'<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>Nenhum contato</p></div>'}`;
}

function rContatos(){
  const rows=contacts.map((c,i)=>`<div class="li"><div class="av ${AVC[i%5]}">${ini(c.name)}</div><div class="linfo"><div class="lname">${c.name}</div><div class="lsub">${c.company||''} ${c.email?'· '+c.email:''}</div></div><div class="lright"><span class="${SBM[c.status]||'bdg bgr'}">${c.status}</span><div style="display:flex;gap:4px;margin-top:3px"><button class="bicon btn-sm" onclick="event.stopPropagation();openModal('contact','${c.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="bicon btn-sm" onclick="event.stopPropagation();delContact('${c.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button></div></div></div>`).join('');
  return`<div class="sechdr"><div class="swrap"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="Buscar..." oninput="filterC(this.value)"></div><button class="btn btn-p btn-sm" onclick="openModal('contact')">+ Novo</button></div><div id="clist">${rows||'<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>Nenhum contato</p></div>'}</div>`;
}

function filterC(q){
  const f=contacts.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())||(c.company||'').toLowerCase().includes(q.toLowerCase()));
  const el=ge('clist');if(!el)return;
  el.innerHTML=f.map((c,i)=>`<div class="li"><div class="av ${AVC[i%5]}">${ini(c.name)}</div><div class="linfo"><div class="lname">${c.name}</div><div class="lsub">${c.company||''} ${c.email?'· '+c.email:''}</div></div><div class="lright"><span class="${SBM[c.status]||'bdg bgr'}">${c.status}</span><div style="display:flex;gap:4px;margin-top:3px"><button class="bicon btn-sm" onclick="openModal('contact','${c.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="bicon btn-sm" onclick="delContact('${c.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button></div></div></div>`).join('')||'<div class="empty"><p>Nenhum resultado</p></div>';
}

function rPipeline(){
  return`<div class="pscroll"><div class="pipeline">${STAGES.map(s=>{const cards=deals.filter(d=>d.stage===s);return`<div class="stage"><div class="shdr"><span>${s}</span><span>${cards.length}</span></div>${cards.map(d=>`<div class="dcard" onclick="openModal('deal','${d.id}')"><div class="dname">${d.name}</div><div class="dcontact">${d.contact_name||''}</div><div class="dval">${fmtV(d.value||0)}</div></div>`).join('')}${!cards.length?'<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px 0">Vazio</div>':''}</div>`;}).join('')}</div></div>`;
}

function rTarefas(){
  const items=tasks.map(t=>`<div class="ti" onclick="toggleTask('${t.id}')"><div class="tck ${t.done?'done':''}">${t.done?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}</div><div style="flex:1;min-width:0"><div class="tt ${t.done?'done':''}">${t.title}</div><div class="tdue">${t.due_date||''}</div></div><button class="bicon btn-sm" onclick="event.stopPropagation();delTask('${t.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button></div>`).join('');
  return`<div class="sechdr"><span class="sectitle">Tarefas (${tasks.length})</span></div><div>${items||'<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Nenhuma tarefa</p></div>'}</div>`;
}

// ── MODALS ──
function openFor(){const m={dashboard:'contact',contatos:'contact',pipeline:'deal',tarefas:'task'};openModal(m[curPage]||'contact');}

function openModal(mode,id=null){
  mmode=mode;mid=id;
  ge('mbg').classList.add('open');
  const title=ge('mtitle'),body=ge('mbody');
  if(mode==='contact'){
    const c=id?contacts.find(x=>x.id===id):null;
    title.textContent=c?'Editar contato':'Novo contato';
    body.innerHTML=`<div class="fg"><label class="fl">Nome</label><input class="fi" id="fn" value="${c?c.name:''}" placeholder="Nome completo"></div><div class="fg"><label class="fl">Empresa</label><input class="fi" id="fco" value="${c?c.company||'':''}" placeholder="Empresa"></div><div class="fg"><label class="fl">Email</label><input class="fi" id="fem" type="email" value="${c?c.email||'':''}" placeholder="email@empresa.com"></div><div class="fg"><label class="fl">Telefone</label><input class="fi" id="fph" value="${c?c.phone||'':''}" placeholder="(11) 99999-0000"></div><div class="fg"><label class="fl">Status</label><select class="fi" id="fst">${['Lead','Prospecto','Cliente','Inativo'].map(s=>`<option ${c&&c.status===s?'selected':''}>${s}</option>`).join('')}</select></div>`;
    setTimeout(()=>{const e=ge('fn');if(e)e.focus();},100);
  }else if(mode==='deal'){
    const d=id?deals.find(x=>x.id===id):null;
    title.textContent=d?'Editar negócio':'Novo negócio';
    const co=contacts.map(c=>`<option ${d&&d.contact_name===c.name?'selected':''}>${c.name}</option>`).join('');
    body.innerHTML=`<div class="fg"><label class="fl">Nome do negócio</label><input class="fi" id="fdn" value="${d?d.name:''}" placeholder="Ex: Empresa X - Plano Pro"></div><div class="fg"><label class="fl">Contato</label><select class="fi" id="fdc">${co||'<option>Adicione contatos primeiro</option>'}</select></div><div class="fg"><label class="fl">Valor (R$)</label><input class="fi" id="fdv" type="number" value="${d?d.value:''}" placeholder="0"></div><div class="fg"><label class="fl">Estágio</label><select class="fi" id="fds">${STAGES.map(s=>`<option ${d&&d.stage===s?'selected':''}>${s}</option>`).join('')}</select></div>`;
  }else if(mode==='task'){
    title.textContent='Nova tarefa';
    body.innerHTML=`<div class="fg"><label class="fl">Título</label><input class="fi" id="ftt" placeholder="Ex: Ligar para o cliente"></div><div class="fg"><label class="fl">Prazo</label><input class="fi" id="ftd" placeholder="Ex: Hoje, Amanhã, 15/05"></div>`;
    setTimeout(()=>{const e=ge('ftt');if(e)e.focus();},100);
  }
}

function closeModal(){ge('mbg').classList.remove('open');mmode='';mid=null;}

async function saveModal(){
  const btn=ge('msave');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    if(mmode==='contact'){
      const name=ge('fn').value.trim();if(!name)return;
      const obj={user_id:cu.id,name,company:ge('fco').value||null,email:ge('fem').value||null,phone:ge('fph').value||null,status:ge('fst').value};
      if(mid){await dbUpdate('contacts',mid,obj);contacts=contacts.map(c=>c.id===mid?{...c,...obj}:c);}
      else{const d=await dbInsert('contacts',obj);if(d)contacts.unshift(d);}
    }else if(mmode==='deal'){
      const name=ge('fdn').value.trim();if(!name)return;
      const obj={user_id:cu.id,name,contact_name:ge('fdc').value,value:Number(ge('fdv').value)||0,stage:ge('fds').value};
      if(mid){await dbUpdate('deals',mid,obj);deals=deals.map(d=>d.id===mid?{...d,...obj}:d);}
      else{const d=await dbInsert('deals',obj);if(d)deals.unshift(d);}
    }else if(mmode==='task'){
      const title=ge('ftt').value.trim();if(!title)return;
      const d=await dbInsert('tasks',{user_id:cu.id,title,due_date:ge('ftd').value||null,done:false});
      if(d)tasks.unshift(d);
    }
    closeModal();render();
  }finally{btn.disabled=false;btn.innerHTML='Salvar';}
}

async function delContact(id){if(!confirm('Remover?'))return;await dbDelete('contacts',id);contacts=contacts.filter(c=>c.id!==id);render();}
async function toggleTask(id){const t=tasks.find(x=>x.id===id);if(!t)return;t.done=!t.done;await dbUpdate('tasks',id,{done:t.done});render();}
async function delTask(id){await dbDelete('tasks',id);tasks=tasks.filter(t=>t.id!==id);render();}

function toggleMenu(){const w=ge('umwrap'),o=ge('umo'),open=!w.classList.contains('open');w.classList.toggle('open',open);o.style.display=open?'block':'none';}
function closeMenu(){ge('umwrap').classList.remove('open');ge('umo').style.display='none';}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&ge('vlogin')&&ge('vlogin').style.display!=='none')doLogin();
  if(e.key==='Enter'&&ge('vreg')&&ge('vreg').style.display!=='none')doRegister();
});

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

(function(){
  try{
    const t=sessionStorage.getItem('crm_tok');
    const u=sessionStorage.getItem('crm_user');
    if(t&&u){tok=t;enterApp(JSON.parse(u));}
    // sem sessão — mostra login
  }catch(e){}
})();
</script>
